name: CI
permissions: read-all

on:
  workflow_dispatch:
  merge_group:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DEBIAN_FRONTEND: noninteractive
  CMAKE_GENERATOR: Ninja
  CXX_STANDARD: 20
  DEFAULT_LLVM_VERSION: 18
  DEFAULT_GCC_VERSION: 14

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_and_test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        version: [12, 13, 14, 15, 16, 18, 19, 20, 21]
        include:
          # --- GCC defaults ---
          - compiler: gcc
            toolchain_root: "/usr"

          - compiler: gcc
            version: 12
            cc: gcc-12
            cxx: g++-12
            install: sudo apt update && sudo apt install -y gcc-12 g++-12

          - compiler: gcc
            version: 13
            cc: gcc-13
            cxx: g++-13
            install: sudo apt update && sudo apt install -y gcc-13 g++-13

          - compiler: gcc
            version: 14
            cc: gcc-14
            cxx: g++-14
            install: sudo apt update && sudo apt install -y gcc-14 g++-14

          - compiler: gcc
            version: 15
            cc: gcc-15
            cxx: g++-15
            install: sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test && sudo apt update && sudo apt install -y gcc-15 g++-15

          - compiler: gcc
            version: 16
            cc: gcc-16
            cxx: g++-16
            install: sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test && sudo apt update && sudo apt install -y gcc-16 g++-16

          # --- Clang defaults ---
          - compiler: clang
            cc: clang
            cxx: clang++

          - compiler: clang
            version: 18
            install: wget https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh 18
            toolchain_root: "/usr/lib/llvm-18"

          - compiler: clang
            version: 19
            install: wget https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh 19
            toolchain_root: "/usr/lib/llvm-19"

          - compiler: clang
            version: 20
            install: wget https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh 20
            toolchain_root: "/usr/lib/llvm-20"

          - compiler: clang
            version: 21
            install: wget https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh 21
            toolchain_root: "/usr/lib/llvm-21"

        exclude:
          - compiler: gcc
            version: 18
          - compiler: gcc
            version: 19
          - compiler: gcc
            version: 20
          - compiler: gcc
            version: 21
          - compiler: clang
            version: 12
          - compiler: clang
            version: 13
          - compiler: clang
            version: 15

    name: ${{ matrix.compiler }}-${{ matrix.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          ${{ matrix.install }}
          sudo apt install -y ninja-build

      - name: Configure
        env:
          CC: ${{ matrix.toolchain_root }}/bin/${{ matrix.cc }}
          CXX: ${{ matrix.toolchain_root }}/bin/${{ matrix.cxx }}
        run: cmake -B ${{ github.workspace }}/build -DCMAKE_CXX_STANDARD=${{ env.CXX_STANDARD }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build

      - name: Test
        run: ctest --test-dir ${{ github.workspace }}/build/test --output-on-failure -j $(nproc)

  clang_tidy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          wget https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh ${{ env.DEFAULT_LLVM_VERSION }}
          sudo apt install -y ninja-build clang-tidy-${{ env.DEFAULT_LLVM_VERSION }}

      - name: Configure
        env:
          CC: /usr/lib/llvm-${{ env.DEFAULT_LLVM_VERSION }}/bin/clang
          CXX: /usr/lib/llvm-${{ env.DEFAULT_LLVM_VERSION }}/bin/clang++
        run: cmake -B ${{ github.workspace }}/build -DCMAKE_CXX_STANDARD=${{ env.CXX_STANDARD }}

      - name: Clang-Tidy
        run: cmake --build ${{ github.workspace }}/build -t clang-tidy

  clang_format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt update && sudo apt install -y ninja-build clang-format-${{ env.DEFAULT_LLVM_VERSION }}

      - name: Configure
        run: cmake -B ${{ github.workspace }}/build -DCMAKE_CXX_STANDARD=${{ env.CXX_STANDARD }}

      - name: Clang-Format
        run: cmake --build ${{ github.workspace }}/build -t clang-format-check

  sanitize:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined]
    name: sanitize-${{ matrix.sanitizer }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          wget https://apt.llvm.org/llvm.sh && chmod +x llvm.sh && sudo ./llvm.sh ${{ env.DEFAULT_LLVM_VERSION }}
          sudo apt install -y ninja-build

      - name: Configure
        env:
          CC: /usr/lib/llvm-${{ env.DEFAULT_LLVM_VERSION }}/bin/clang
          CXX: /usr/lib/llvm-${{ env.DEFAULT_LLVM_VERSION }}/bin/clang++
        run: cmake -B ${{ github.workspace }}/build -DCMAKE_CXX_STANDARD=${{ env.CXX_STANDARD }} -DROS_SANITIZER=${{ matrix.sanitizer }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build

      - name: Test
        run: ctest --test-dir ${{ github.workspace }}/build/test --output-on-failure -j $(nproc)

  valgrind:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt update && sudo apt install -y gcc-${{ env.DEFAULT_GCC_VERSION }} g++-${{ env.DEFAULT_GCC_VERSION }} ninja-build valgrind

      - name: Configure
        env:
          CC: /usr/bin/gcc-${{ env.DEFAULT_GCC_VERSION }}
          CXX: /usr/bin/g++-${{ env.DEFAULT_GCC_VERSION }}
        run: cmake -B ${{ github.workspace }}/build -DCMAKE_CXX_STANDARD=${{ env.CXX_STANDARD }}

      - name: Valgrind
        run: cmake --build ${{ github.workspace }}/build -t valgrind

  all_pass:
    runs-on: ubuntu-24.04
    needs: [build_and_test, clang_tidy, clang_format, sanitize, valgrind]
    if: ${{ !cancelled() }}
    steps:
      - name: Gate
        if: >-
          ${{
               contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
          }}
        run: exit 1
